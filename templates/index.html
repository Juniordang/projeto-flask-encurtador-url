<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Encurtador de URL</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <h1>Encurtador de Url</h1>
      <p>
        Encurte seus links de forma rápida e receba, SIIII GRAÇAS A DEUS PAI...
      </p>

      <form method="POST">
        <div class="input-group">
          <input
            type="url"
            name="url_longa"
            placeholder="Cole seu link gigante aqui..."
            required
          />
        </div>
        <button type="submit">Gerar Link Curto</button>
      </form>
    </div>
  </body>
</html>
